name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build app
        run: |
          pyinstaller --windowed --name img2 img2.py
      
      - name: Create DMG
        uses: create-dmg@v1
        with:
          app-path: dist/img2.app
          output-path: img2.dmg
      
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: img2.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
