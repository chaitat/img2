name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build app
        run: |
          pyinstaller --windowed --name img2 --icon icons/icon.icns img2.py
      
      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "img2" \
            --window-pos 200 200 \
            --icon-size 100 \
            --app-drop-link 200 300 \
            "img2.dmg" \
            "dist/img2.app"
      
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: img2.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
